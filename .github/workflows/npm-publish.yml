name: Publish to NPM

on:
  push:
    branches:
      - master # Trigger on merge/push to the master branch

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Recommended Node.js version for Angular 17/18
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Library
        run: npm run build

      - name: Publish to NPM
        run: |
          # ng-packagr outputs the ready-to-publish library in the dist/ directory
          cd dist/
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
